---
- name: Configure Alpine Pi
  hosts: pi
  gather_facts: false
  force_handlers: true

  handlers:
    - name: activate awall
      ansible.builtin.command: awall activate -f
      notify: restart fail2ban

    - name: save alpine state
      ansible.builtin.command: lbu commit -d
      listen: "lbu commit"

    - name: restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

    - name: reload sysctl
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-rootless.conf

    - name: restart chronyd
      ansible.builtin.service:
        name: chronyd
        state: restarted

    - name: restart containers
      ansible.builtin.service:
        name: containers
        state: restarted

  pre_tasks:
    - name: Set system hostname permanently to 'pi'
      ansible.builtin.hostname:
        name: pi
      notify: "lbu commit"

    - name: Update /etc/hosts for correct localhost resolution
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.0\.1\s+localhost'
        line: '127.0.0.1       localhost pi'
      notify: "lbu commit"

    - name: Bootstrap Python for Ansible
      ansible.builtin.raw: apk add --no-cache python3 || true
      changed_when: false

    - name: Prevent udhcpc from overwriting resolv.conf
      ansible.builtin.copy:
        dest: /etc/udhcpc/udhcpc.conf
        content: |
          RESOLV_CONF="no"
        mode: '0644'
      notify: "lbu commit"

    - name: Ensure reliable fallback DNS is present
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 1.1.1.1
          nameserver 9.9.9.9
        mode: '0644'
      notify: "lbu commit"

    - name: Gather facts explicitly
      ansible.builtin.setup:

  tasks:
    - name: Update apk cache and install basic tools
      community.general.apk:
        name:
          - nano
          - htop
          - curl
          - e2fsprogs
          - ncurses-terminfo
        state: present
        update_cache: yes
      notify: "lbu commit"

    - name: Install chrony for time synchronization
      community.general.apk:
        name: chrony
        state: present
      notify: "lbu commit"

    - name: Configure Chrony with hardcoded IP for initial sync (Cloudflare/PTB)
      ansible.builtin.lineinfile:
        path: /etc/chrony/chrony.conf
        line: "{{ item }}"
        insertafter: EOF
      loop:
        - "server 162.159.200.1 iburst"  # Cloudflare
        - "server 192.53.103.108 iburst" # PTB Braunschweig
      notify: 
        - restart chronyd
        - lbu commit

    - name: Enable and start chronyd service
      ansible.builtin.service:
        name: chronyd
        enabled: yes
        state: started

    - name: Enforce strictly allowed SSH keys for root
      ansible.posix.authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', 'authorized_keys') }}"
        exclusive: yes
      notify: "lbu commit"

    # --- SSH Härten ---
    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: 
        - restart sshd
        - lbu commit

    - name: Disable root password login (allow keys only)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
      notify: 
        - restart sshd
        - lbu commit

    # --- Daten-Partition mounten ---
    - name: Mount data partition and add to fstab
      ansible.posix.mount:
        path: /mnt/data
        src: /dev/mmcblk0p2
        fstype: ext4
        opts: defaults,noatime
        state: mounted
      notify: "lbu commit"

    # --- NEU: awall Firewall ---
    - name: Install awall and iptables
      community.general.apk:
        name:
          - awall
          - iptables
          - ip6tables
        state: present
      notify: "lbu commit"

    - name: Enable iptables service on boot
      ansible.builtin.service:
        name: iptables
        enabled: yes
      notify: "lbu commit"

    # --- awall Firewall (Erweitert für Syncthing & Gitea) ---
    - name: Configure awall base policy with container ports
      ansible.builtin.copy:
        dest: /etc/awall/optional/server.json
        content: |
          {
            "description": "Single Node Server Firewall",
            "zone": {
              "ext": { "iface": "eth0" }
            },
            "policy": [
              { "in": "ext", "action": "drop" },
              { "action": "accept" }
            ],
            "filter": [
              { "in": "ext", "service": ["ssh", "ping"], "action": "accept" },
              { "in": "ext", "port": [3000, 2222], "protocol": "tcp", "action": "accept" },
              { "in": "ext", "port": [53, 3001, 8080], "protocol": "tcp", "action": "accept" },
          { "in": "ext", "port": [53, 3001, 3002, 5001, 8080], "protocol": "tcp", "action": "accept" },
              { "in": "ext", "port": 53, "protocol": "udp", "action": "accept" }
            ]
          }
        mode: '0644'
      notify: 
        - activate awall
        - lbu commit

    - name: Enable awall server policies
      ansible.builtin.command: awall enable server
      args:
        creates: /etc/awall/server.json
      notify: 
        - activate awall
        - lbu commit

    # --- Sicherheit: Fail2ban ---
    - name: Install fail2ban
      community.general.apk:
        name: fail2ban
        state: present
      notify: "lbu commit"

    - name: Configure fail2ban for SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          ignoreip = 127.0.0.1/8 192.168.178.0/24
          banaction = iptables-multiport

          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/messages
          maxretry = 3
          bantime = 3600
          findtime = 600
        mode: '0644'
      notify: 
        - restart fail2ban
        - lbu commit

    - name: Enable and start fail2ban service
      ansible.builtin.service:
        name: fail2ban
        enabled: yes
        state: started

    # --- Repositories anpassen ---
    - name: Enable Alpine community repository
      ansible.builtin.replace:
        path: /etc/apk/repositories
        # Sucht nach der auskommentierten Community-Zeile und entfernt die Raute (#)
        regexp: '^#\s*(http.*/community)$'
        replace: '\1'
      notify: "lbu commit"

    # --- Rootless Podman: Basis-Pakete & Cgroups ---
    - name: Install Podman, Compose, TUI and rootless dependencies
      community.general.apk:
        name:
          - podman
          - podman-compose
          - podman-tui       # <-- NEU: Dashboard-Tool
          - shadow           
          - fuse-overlayfs   
          - slirp4netns      
          - iptables
        state: present
        update_cache: yes
      notify: "lbu commit"

    - name: Ensure cgroups service is enabled and started
      ansible.builtin.service:
        name: cgroups
        enabled: yes
        state: started
      notify: "lbu commit"

    # --- Rootless Podman: User & Mapping ---
    - name: Create podman group
      ansible.builtin.group:
        name: podman
        state: present
      notify: "lbu commit"

    - name: Create dedicated podman user
      ansible.builtin.user:
        name: podman_user
        group: podman
        shell: /bin/ash
        create_home: yes
        home: /mnt/data/podman_user
      notify: "lbu commit"

    - name: Add XDG_RUNTIME_DIR to podman_user profile
      ansible.builtin.lineinfile:
        path: /mnt/data/podman_home/.profile
        regexp: '^export XDG_RUNTIME_DIR='
        line: 'export XDG_RUNTIME_DIR=/tmp/podman_run'  # <-- Ab in den RAM damit!
        create: yes
        owner: podman_user
        group: podman
        mode: '0644'
      notify: "lbu commit"

    - name: Define subuid for podman_user
      ansible.builtin.lineinfile:
        path: /etc/subuid
        regexp: '^podman_user:'
        line: 'podman_user:100000:65536'
        create: yes
      notify: "lbu commit"

    - name: Define subgid for podman_user
      ansible.builtin.lineinfile:
        path: /etc/subgid
        regexp: '^podman_user:'
        line: 'podman_user:100000:65536'
        create: yes
      notify: "lbu commit"

    # --- Persistenz & Rechte ---
    - name: Create persistent data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: podman_user
        group: podman
        mode: '0755'
      loop:
        - /mnt/data/gitea
        - /mnt/data/adguard/work
        - /mnt/data/adguard/conf
      notify: "lbu commit"

    - name: Create persistent data directories (Open permissions for new apps)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: podman_user
        group: podman
        mode: '0777'
      loop:
        - /mnt/data/homepage
        - /mnt/data/dockge
        - /mnt/data/stacks/core
      notify: "lbu commit"

    - name: Generate Homepage .env securely from SOPS
      ansible.builtin.copy:
        dest: /mnt/data/homepage/.env
        owner: podman_user
        group: podman
        mode: '0600' # Strikte Rechte: Nur podman_user darf lesen!
        content: |
          HOMEPAGE_VAR_ADGUARD_USER=haku
          HOMEPAGE_VAR_ADGUARD_PASSWORD={{ lookup('community.sops.sops', '../../secrets/secrets.yaml', name='adguard_password') }}
      notify: "lbu commit"

    - name: Configure Homepage services dashboard
      ansible.builtin.copy:
        dest: /mnt/data/homepage/services.yaml
        owner: podman_user
        group: podman
        mode: '0644'
        content: |
          {% raw %}
          - Infrastructure:
              - Dockge:
                  icon: dockge.png
                  href: http://192.168.178.69:5001
                  description: Container Management

          - Network:
              - AdGuard Home:
                  icon: adguard-home.png
                  href: http://192.168.178.69:8080
                  description: DNS Sinkhole
                  widget:
                    type: adguard
                    url: http://192.168.178.69:8080
                    username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
                    password: "{{HOMEPAGE_VAR_ADGUARD_PASSWORD}}"

          - Development:
              - Gitea:
                  icon: gitea.png
                  href: http://192.168.178.69:3000
                  description: Git Hosting
          {% endraw %}
      notify: "lbu commit"

    - name: Ensure persistent local run directory is ABSENT to prevent Boot-ID mismatch
      ansible.builtin.file:
        path: /mnt/data/podman_user/.run
        state: absent
      notify: "lbu commit"

    - name: Allow unprivileged users to bind to port 53 (DNS)
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-rootless.conf
        content: |
          net.ipv4.ip_unprivileged_port_start=53
        mode: '0644'
      notify: 
        - reload sysctl
        - lbu commit

    - name: Apply sysctl settings immediately
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-rootless.conf
      changed_when: false

    # --- Podman Compose Setup & API ---
    - name: Deploy docker-compose.yml
      ansible.builtin.copy:
        dest: /mnt/data/stacks/core/docker-compose.yml
        owner: podman_user
        group: podman
        mode: '0644'
        content: |
          services:
            gitea:
              image: docker.io/gitea/gitea:latest
              container_name: gitea
              restart: unless-stopped
              ports:
                - "3000:3000"
                - "2222:22"
              volumes:
                - /mnt/data/gitea:/data

            adguard:
              image: docker.io/adguard/adguardhome:latest
              container_name: adguard
              restart: unless-stopped
              ports:
                - "53:53/tcp"
                - "53:53/udp"
                - "3001:3000/tcp"
                - "8080:80/tcp"
              volumes:
                - /mnt/data/adguard/work:/opt/adguardhome/work
                - /mnt/data/adguard/conf:/opt/adguardhome/conf
            homepage:
              image: ghcr.io/gethomepage/homepage:latest
              container_name: homepage
              restart: unless-stopped
              user: "0:0"
              environment:
                # NEU: Zwingend erforderliche Variable für v1.0+
                - HOMEPAGE_ALLOWED_HOSTS=192.168.178.69:3002,192.168.178.69
              env_file:
                - /mnt/data/homepage/.env
              ports:
                - "3002:3000"
              volumes:
                - /mnt/data/homepage:/app/config
                - /tmp/podman_run/podman.sock:/var/run/docker.sock:ro

            dockge:
              image: docker.io/louislam/dockge:latest
              container_name: dockge
              restart: unless-stopped
              user: "0:0"
              environment:
                - DOCKER_HOST=unix:///var/run/docker.sock
              ports:
                - "5001:5001"
              volumes:
                - /tmp/podman_run/podman.sock:/var/run/docker.sock
                - /mnt/data/dockge:/app/data
                - /mnt/data/stacks:/opt/stacks
      notify:
        - restart containers
        - lbu commit

    - name: Create robust OpenRC init script for Podman Compose
      ansible.builtin.copy:
        dest: /etc/init.d/containers
        mode: '0755'
        content: |
          #!/sbin/openrc-run
          
          name="Podman Compose Services"
          description="Runs rootless Podman containers via compose"
          
          depend() {
              need net localmount cgroups
              use chronyd
              after firewall chronyd
          }
          
          start() {
              ebegin "Forcing time sync via configured servers"
              chronyc makestep || true

              ebegin "Fixing shared mount propagation for rootless Podman"
              mount --make-rshared /

              ebegin "Cleaning up persistent Podman state to prevent Boot-ID mismatch"
              rm -rf /mnt/data/podman_user/.run
              
              ebegin "Preparing volatile runtime directory in RAM"
              mkdir -p /tmp/podman_run
              chown podman_user:podman /tmp/podman_run
              chmod 0755 /tmp/podman_run
             
              ebegin "Starting Podman API socket for Dockge/Homepage"
              su -l podman_user -c "export XDG_RUNTIME_DIR=/tmp/podman_run; podman system service -t 0 unix:///tmp/podman_run/podman.sock &"
              
              # Kurze Pause, damit der Socket erstellt wird, bevor die Container starten
              sleep 2
              chmod 0666 /tmp/podman_run/podman.sock || true
              
              ebegin "Starting containers via podman-compose"
              su -l podman_user -c "export XDG_RUNTIME_DIR=/tmp/podman_run; podman-compose -f /mnt/data/stacks/core/docker-compose.yml up -d"
              eend $?
          }
          
          stop() {
              ebegin "Stopping containers via podman-compose"
              su -l podman_user -c "export XDG_RUNTIME_DIR=/tmp/podman_run; podman-compose -f /mnt/data/stacks/core/docker-compose.yml down"

              ebegin "Stopping Podman API socket"
              pkill -u podman_user -f "podman system service" || true
              eend $?
          }
      notify: "lbu commit"

    - name: Enable and start containers OpenRC service
      ansible.builtin.service:
        name: containers
        enabled: yes
        state: started
